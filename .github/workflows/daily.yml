name: Hindu AI Knowledge Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Free disk
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y python3-pip
        pip install -r requirements.txt

    - name: Install Ollama
      run: |
        curl -fsSL https://ollama.com/install.sh | sh

    - name: Start Ollama
      run: |
        ollama serve &
        sleep 5

    - name: Pull Phi3 model
      run: |
        ollama pull phi3

    - name: Create scriptures
      run: |
        mkdir -p scriptures

        echo "Arjuna asked Krishna about the restless nature of the mind." > scriptures/bhagavad_gita.txt
        echo "Krishna taught that disciplined action without attachment leads to peace." >> scriptures/bhagavad_gita.txt

        echo "Let noble thoughts come from every direction." > scriptures/vedas.txt

        echo "The Self is the ultimate reality." > scriptures/upanishads.txt

        echo "Dharma sustains the world." > scriptures/puranas.txt

    - name: Run pipeline
      run: |
        python engine/prepare_corpus.py
        python engine/build_embeddings.py
        python engine/retrieve_context.py
        python engine/generate_report.py
        python engine/refine_report.py
        python engine/send_telegram.py
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
