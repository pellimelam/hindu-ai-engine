name: Hindu AI Knowledge Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    # free space first
    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc

    - name: Install system dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake build-essential python3-pip

    - name: Install Python packages
      run: |
        pip install -r requirements.txt
        pip install huggingface_hub

    - name: Build llama.cpp
      run: |
        git clone https://github.com/ggerganov/llama.cpp
        cd llama.cpp
        cmake -B build
        cmake --build build --config Release

    - name: Download TinyLlama model
      run: |
        mkdir -p models
        hf download \
          TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF \
          tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf \
          --local-dir models

        mv models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf models/model.gguf

    - name: Run pipeline
      run: |
        python engine/prepare_corpus.py
        python engine/build_embeddings.py
        python engine/retrieve_context.py
        python engine/generate_report.py
        python engine/refine_report.py
        python engine/send_telegram.py
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    - name: Cleanup
      run: rm -rf models
