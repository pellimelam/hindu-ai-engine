name: Hindu AI Knowledge Engine

on:
  schedule:
    - cron: "30 1 * * *"
  workflow_dispatch:

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake build-essential python3-pip

    - name: Install python deps
      run: pip install -r requirements.txt

    - name: Build llama.cpp
      run: |
        git clone https://github.com/ggerganov/llama.cpp
        cd llama.cpp
        cmake -B build
        cmake --build build --config Release

    - name: Install Hugging Face CLI
      run: pip install -U "huggingface_hub[cli]"

    - name: Download model
      run: |
        mkdir -p models
        huggingface-cli download \
          TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF \
          --include "*Q4_K_M.gguf" \
          --local-dir models

        mv models/*Q4_K_M.gguf models/model.gguf

    - name: Run pipeline
      run: |
        python engine/prepare_corpus.py
        python engine/build_embeddings.py
        python engine/retrieve_context.py
        python engine/generate_report.py
        python engine/refine_report.py
        python engine/send_telegram.py
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    - name: Cleanup
      run: rm -rf models
