name: Hindu AI Knowledge Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Free disk
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake build-essential python3-pip
        pip install -r requirements.txt

    - name: Cache HuggingFace models
      uses: actions/cache@v4
      with:
        path: ~/.cache/huggingface
        key: hf-cache

    - name: Build llama.cpp
      run: |
        git clone https://github.com/ggerganov/llama.cpp
        cd llama.cpp
        cmake -B build
        cmake --build build --config Release

    - name: Create scripture corpus
      run: |
        mkdir -p scriptures

        cat <<EOF > scriptures/bhagavad_gita.txt
Arjuna said the mind is restless and difficult to control.
Krishna replied that discipline and detachment can control the mind.
One should perform duty without attachment to results.
Yoga is balance in action.
EOF

        cat <<EOF > scriptures/vedas.txt
Let noble thoughts come to us from all directions.
Truth is one, sages call it by many names.
The universe is sustained by cosmic order called Rta.
Knowledge leads to liberation.
EOF

        cat <<EOF > scriptures/upanishads.txt
The Self is the ultimate reality.
He who knows the Self transcends sorrow.
Meditation reveals the inner truth.
All existence is Brahman.
EOF

        cat <<EOF > scriptures/puranas.txt
Dharma sustains the world.
The divine manifests in many forms to restore balance.
Devotion leads to spiritual liberation.
Righteous living preserves cosmic harmony.
EOF

    - name: Install HuggingFace CLI
      run: pip install huggingface_hub

    - name: Download LLM model
      run: |
        mkdir -p models

        hf download \
          TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF \
          tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf \
          --local-dir models

        mv models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf models/model.gguf
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}

    - name: Run AI pipeline
      run: |
        python engine/prepare_corpus.py
        python engine/build_embeddings.py
        python engine/retrieve_context.py
        python engine/generate_report.py
        python engine/refine_report.py
        python engine/send_telegram.py
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
