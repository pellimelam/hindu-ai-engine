name: Hindu AI Knowledge Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Free disk space
        run: |
          sudo rm -rf /usr/share/dotnet
          sudo rm -rf /opt/ghc

      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y cmake build-essential python3-pip

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-model-cache

      - name: Build llama.cpp
        run: |
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          cmake -B build
          cmake --build build --config Release

      - name: Create scripture corpus
        run: |
          mkdir -p scriptures

          echo "Arjuna said the mind is restless and difficult to control." > scriptures/bhagavad_gita.txt
          echo "Krishna replied that discipline and detachment can control the mind." >> scriptures/bhagavad_gita.txt
          echo "One should perform duty without attachment to results." >> scriptures/bhagavad_gita.txt

          echo "Let noble thoughts come to us from all directions." > scriptures/vedas.txt
          echo "Truth is one, sages call it by many names." >> scriptures/vedas.txt

          echo "The Self is the ultimate reality." > scriptures/upanishads.txt
          echo "He who knows the Self transcends sorrow." >> scriptures/upanishads.txt

          echo "Dharma sustains the world." > scriptures/puranas.txt
          echo "Devotion leads to liberation." >> scriptures/puranas.txt

      - name: Ensure models directory
        run: |
          mkdir -p models

      - name: Run AI pipeline
        run: |
          python engine/prepare_corpus.py
          python engine/build_embeddings.py
          python engine/retrieve_context.py
          python engine/generate_report.py
          python engine/refine_report.py
          python engine/send_telegram.py
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
