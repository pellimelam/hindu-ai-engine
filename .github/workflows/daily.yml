name: Hindu AI Knowledge Engine

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

jobs:

  run:

    runs-on: ubuntu-latest

    steps:

    - uses: actions/checkout@v4

    - name: Free disk
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y cmake build-essential python3-pip
        pip install -r requirements.txt

    - name: Cache llama.cpp build
      uses: actions/cache@v4
      with:
        path: llama.cpp
        key: llama-build

    - name: Build llama.cpp
      run: |
        if [ ! -d "llama.cpp" ]; then
          git clone https://github.com/ggerganov/llama.cpp
          cd llama.cpp
          cmake -B build
          cmake --build build --config Release
        fi

    - name: Cache model
      uses: actions/cache@v4
      with:
        path: models
        key: tinyllama-model

    - name: Download model
      run: |
        if [ ! -f "models/model.gguf" ]; then
          mkdir -p models
          pip install huggingface_hub
          hf download \
            TheBloke/TinyLlama-1.1B-Chat-v1.0-GGUF \
            tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf \
            --local-dir models
          mv models/tinyllama-1.1b-chat-v1.0.Q4_K_M.gguf models/model.gguf
        fi

    - name: Run pipeline
      run: |
        python engine/prepare_corpus.py
        python engine/build_embeddings.py
        python engine/retrieve_context.py
        python engine/generate_report.py
        python engine/refine_report.py
        python engine/send_telegram.py
      env:
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
